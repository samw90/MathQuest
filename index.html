          else data=JSON.parse(text);
          if(!data || typeof data!=='object' || Array.isArray(data)) throw new Error('That file is not a Math Quest backup.');
          var looksRight=('xp' in data)||('levels' in data)||('skills' in data)||('stickers' in data);
          if(!looksRight && !confirm("This file doesn't look like a Math Quest backup. Restore it anyway?")){ input.remove(); return; }
          if(!confirm('Restore from this file? The progress saved on this device will be replaced.')){ input.remove(); return; }
          if(!(window.storage && window.storage.set)) throw new Error('Saving is not available in this environment.');
          await window.storage.set(window.__mqActiveKey||KEY, JSON.stringify(data));
          alert('Progress restored. Reloading\u2026');
          location.reload();
        } catch(err){ alert('Restore failed: ' + (err && err.message ? err.message : err)); }
        input.remove();
      };
      reader.onerror=function(){ alert('Could not read that file.'); input.remove(); };
      reader.readAsText(file);
    };
    document.body.appendChild(input); input.click();
  };
})();
</script>
